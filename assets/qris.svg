<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#ffffff"/>
  <!-- Latar pola titik menyerupai QR -->
  <g fill="#0f172a">
    <!-- Pola acak menyerupai module QR -->
    <rect x="20" y="20" width="15" height="15"/><rect x="45" y="20" width="15" height="15"/><rect x="90" y="20" width="15" height="15"/><rect x="135" y="20" width="15" height="15"/><rect x="195" y="20" width="15" height="15"/><rect x="255" y="20" width="15" height="15"/>
    <rect x="20" y="45" width="15" height="15"/><rect x="75" y="45" width="15" height="15"/><rect x="105" y="45" width="15" height="15"/><rect x="150" y="45" width="15" height="15"/><rect x="180" y="45" width="15" height="15"/><rect x="225" y="45" width="15" height="15"/>
    <rect x="45" y="75" width="15" height="15"/><rect x="90" y="75" width="15" height="15"/><rect x="120" y="75" width="15" height="15"/><rect x="165" y="75" width="15" height="15"/><rect x="210" y="75" width="15" height="15"/><rect x="255" y="75" width="15" height="15"/>
    <rect x="20" y="105" width="15" height="15"/><rect x="60" y="105" width="15" height="15"/><rect x="135" y="105" width="15" height="15"/><rect x="180" y="105" width="15" height="15"/><rect x="225" y="105" width="15" height="15"/>
    <rect x="45" y="135" width="15" height="15"/><rect x="90" y="135" width="15" height="15"/><rect x="150" y="135" width="15" height="15"/><rect x="195" y="135" width="15" height="15"/><rect x="240" y="135" width="15" height="15"/><rect x="270" y="135" width="15" height="15"/>
    <rect x="20" y="165" width="15" height="15"/><rect x="75" y="165" width="15" height="15"/><rect x="120" y="165" width="15" height="15"/><rect x="165" y="165" width="15" height="15"/><rect x="210" y="165" width="15" height="15"/><rect x="255" y="165" width="15" height="15"/>
    <rect x="45" y="195" width="15" height="15"/><rect x="105" y="195" width="15" height="15"/><rect x="135" y="195" width="15" height="15"/><rect x="180" y="195" width="15" height="15"/><rect x="225" y="195" width="15" height="15"/>
    <rect x="20" y="225" width="15" height="15"/><rect x="60" y="225" width="15" height="15"/><rect x="90" y="225" width="15" height="15"/><rect x="150" y="225" width="15" height="15"/><rect x="195" y="225" width="15" height="15"/><rect x="240" y="225" width="15" height="15"/>
    <rect x="45" y="255" width="15" height="15"/><rect x="105" y="255" width="15" height="15"/><rect x="135" y="255" width="15" height="15"/><rect x="180" y="255" width="15" height="15"/><rect x="210" y="255" width="15" height="15"/><rect x="255" y="255" width="15" height="15"/>
  </g>
  <!-- Tiga finder pattern (sudut) -->
  <g fill="none" stroke="#0f172a" stroke-width="6">
    <rect x="20" y="20" width="48" height="48"/>
    <rect x="232" y="20" width="48" height="48"/>
    <rect x="20" y="232" width="48" height="48"/>
  </g>
  <g fill="#0f172a">
    <rect x="32" y="32" width="24" height="24"/>
    <rect x="244" y="32" width="24" height="24"/>
    <rect x="32" y="244" width="24" height="24"/>
  </g>
  <!-- Logo QRIS placeholder di tengah -->
  <rect x="115" y="115" width="70" height="70" rx="10" fill="#ffffff" stroke="#dc2626" stroke-width="3"/>
  <text x="150" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#dc2626">QRIS</text>
  <text x="150" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">(contoh)</text>
</svg>
